name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Zig Version
        run: zig version

      - name: Format Check
        run: zig fmt --check src/ examples/ docs/

      - name: Default Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Test Suite
        run: zig build test

      - name: Reduced Feature Build
        run: zig build -Dtls=false -Dpost-quantum=false -Dhardware-accel=false -Dasync=false
